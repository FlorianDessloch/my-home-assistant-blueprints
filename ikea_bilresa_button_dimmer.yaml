blueprint:
  name: IKEA Bilresa Fernbedienung (Matter / Event)
  description: >
    Steuert eine Lichtgruppe mit der IKEA Bilresa 2-Tasten-Fernbedienung.
    Wähle im UI einfach die beiden Event-Entitäten für Taste 1 und Taste 2 aus.
  domain: automation
  source_url: https://github.com/FlorianDessloch/my-home-assistant-blueprints/blob/main/ikea_bilrea_button_dimmer.yaml
  input:
    button_1:
      name: Taste 1 (Großer Punkt)
      description: Wähle die Entität für Taste 1 (z. B. event.bilresa_button_1)
      selector:
        entity:
          domain:
            - event
            - sensor
    button_2:
      name: Taste 2 (Kleiner Punkt)
      description: Wähle die Entität für Taste 2 (z. B. event.bilresa_button_2)
      selector:
        entity:
          domain:
            - event
            - sensor
    target_light:
      name: Ziel-Licht / Licht-Gruppe
      description: Das zu steuernde Licht oder die Licht-Gruppe.
      selector:
        target:
          entity:
            - domain: light
    dim_step:
      name: Dimm-Schrittweite (%)
      default: 5
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: "%"
    dim_speed:
      name: Dimm-Geschwindigkeit (ms)
      default: 300
      selector:
        number:
          min: 100
          max: 1000
          step: 50
          unit_of_measurement: "ms"

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input button_1
    id: b1
  - platform: state
    entity_id: !input button_2
    id: b2

action:
  - variables:
      # Liest das Matter-Event aus den Attributen oder den Status aus
      evt: "{{ trigger.to_state.attributes.event_type | default(trigger.to_state.state, true) }}"
      step_up: !input dim_step
      step_down: "{{ (step_up | int) * -1 }}"

  - choose:
      # --- Taste 1: Klick -> Toggle ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'b1' and evt in ['initial_press', 'multi_press_1', 'press', '1_single', 'on'] }}"
        sequence:
          - action: light.toggle
            target: !input target_light

      # --- Taste 2: Klick -> Toggle ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'b2' and evt in ['initial_press', 'multi_press_1', 'press', '2_single', 'off'] }}"
        sequence:
          - action: light.toggle
            target: !input target_light

      # --- Taste 1: Halten -> Hochdimmen ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'b1' and evt in ['long_press', '1_hold', 'hold'] }}"
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: "{{ true }}"
              sequence:
                - action: light.turn_on
                  target: !input target_light
                  data:
                    brightness_step_pct: !input dim_step
                - delay:
                    milliseconds: !input dim_speed

      # --- Taste 2: Halten -> Runterdimmen ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'b2' and evt in ['long_press', '2_hold', 'hold'] }}"
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: "{{ true }}"
              sequence:
                - action: light.turn_on
                  target: !input target_light
                  data:
                    brightness_step_pct: "{{ step_down }}"
                - delay:
                    milliseconds: !input dim_speed

      # --- Loslassen: Stoppt die Dimm-Schleife sofort ---
      - conditions:
          - condition: template
            value_template: "{{ evt in ['long_release', 'short_release', 'release', '1_release', '2_release'] }}"
        sequence: []
