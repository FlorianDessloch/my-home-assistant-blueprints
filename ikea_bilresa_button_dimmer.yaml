blueprint:
  name: IKEA Bilresa Fernbedienung - Lichtsteuerung (Geräte-Auswahl)
  description: >
    Steuert ein Licht oder eine Licht-Gruppe mit einer IKEA Bilresa Fernbedienung.
    Wähle einfach direkt das IKEA Bilresa Gerät aus der Liste.
    - Taste 1 (Großer Punkt): Klick = Toggle | Halten = Hochdimmen
    - Taste 2 (Kleiner Punkt): Klick = Toggle | Halten = Runterdimmen
  domain: automation
  source_url: https://github.com/FlorianDessloch/my-home-assistant-blueprints/blob/main/ikea_bilrea_button_dimmer.yaml
  input:
    remote_device:
      name: IKEA Bilresa Fernbedienung
      description: Wähle hier direkt das Gerät deiner IKEA Bilresa Fernbedienung aus.
      selector:
        device: {}
    target_light:
      name: Ziel-Licht / Licht-Gruppe
      description: Das zu steuernde Licht oder die Licht-Gruppe.
      selector:
        target:
          entity:
            - domain: light
    dim_step:
      name: Dimm-Schrittweite (%)
      description: Um wie viel Prozent die Helligkeit pro Schritt angepasst wird.
      default: 5
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: "%"
    dim_speed:
      name: Dimm-Geschwindigkeit (ms)
      description: Zeitabstand zwischen den Dimm-Schritten in Millisekunden (kleiner = schneller).
      default: 300
      selector:
        number:
          min: 100
          max: 1000
          step: 50
          unit_of_measurement: "ms"

variables:
  step: !input dim_step
  step_down: "{{ (step | int) * -1 }}"

mode: restart
max_exceeded: silent

trigger:
  # --- Zigbee2MQTT Device Triggers ---
  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: 1_single
    id: t1_single
  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: "on"
    id: t1_single

  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: 2_single
    id: t2_single
  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: "off"
    id: t2_single

  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: 1_hold
    id: t1_hold
  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: brightness_move_up
    id: t1_hold

  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: 2_hold
    id: t2_hold
  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: brightness_move_down
    id: t2_hold

  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: release
    id: release
  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: 1_release
    id: release
  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: 2_release
    id: release
  - platform: device
    domain: mqtt
    device_id: !input remote_device
    type: action
    subtype: brightness_stop
    id: release

  # --- ZHA Event Triggers ---
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input remote_device
      command: "on"
    id: t1_single
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input remote_device
      command: "off"
    id: t2_single
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input remote_device
      command: "move_with_on_off"
    id: t1_hold
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input remote_device
      command: "move"
    id: t2_hold
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input remote_device
      command: "stop"
    id: release
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input remote_device
      command: "stop_with_on_off"
    id: release

action:
  - choose:
      # --- Taste 1 oder Taste 2 Klick: Toggle ---
      - conditions:
          - condition: trigger
            id:
              - t1_single
              - t2_single
        sequence:
          - action: light.toggle
            target: !input target_light

      # --- Taste 1 (Großer Punkt) Halten: Hochdimmen ---
      - conditions:
          - condition: trigger
            id:
              - t1_hold
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: "{{ true }}"
              sequence:
                - action: light.turn_on
                  target: !input target_light
                  data:
                    brightness_step_pct: !input dim_step
                - delay:
                    milliseconds: !input dim_speed

      # --- Taste 2 (Kleiner Punkt) Halten: Runterdimmen ---
      - conditions:
          - condition: trigger
            id:
              - t2_hold
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: "{{ true }}"
              sequence:
                - action: light.turn_on
                  target: !input target_light
                  data:
                    brightness_step_pct: "{{ step_down }}"
                - delay:
                    milliseconds: !input dim_speed

      # --- Loslassen (Release): Beendet die Dimm-Schleife sofort ---
      - conditions:
          - condition: trigger
            id:
              - release
        sequence: []
