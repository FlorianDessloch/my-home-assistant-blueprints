blueprint:
  name: IKEA Bilresa Fernbedienung - Lichtsteuerung (Geräte-Auswahl)
  description: >
    Steuert ein Licht oder eine Licht-Gruppe mit einer IKEA Bilresa Fernbedienung.
    Wähle einfach direkt das Fernbedienungs-Gerät aus.
  domain: automation
  source_url: https://github.com/FlorianDessloch/my-home-assistant-blueprints/blob/main/ikea_bilrea_button_dimmer.yaml
  input:
    remote_device:
      name: IKEA Bilresa Fernbedienung
      description: Wähle hier das Gerät deiner IKEA Bilresa aus.
      selector:
        device: {}
    target_light:
      name: Ziel-Licht / Licht-Gruppe
      description: Das zu steuernde Licht oder die Licht-Gruppe.
      selector:
        target:
          entity:
            - domain: light
    dim_step:
      name: Dimm-Schrittweite (%)
      description: Helligkeitsänderung pro Schritt in Prozent.
      default: 5
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: "%"
    dim_speed:
      name: Dimm-Geschwindigkeit (ms)
      description: Zeitabstand zwischen den Schritten in Millisekunden.
      default: 300
      selector:
        number:
          min: 100
          max: 1000
          step: 50
          unit_of_measurement: "ms"

mode: restart
max_exceeded: silent

trigger:
  # ZHA Events abfangen
  - platform: event
    event_type: zha_event
  # Zigbee2MQTT / Sensor-Zustandsänderungen abfangen
  - platform: event
    event_type: state_changed

condition:
  # Filtert nur Events heraus, die exakt zu dem ausgewählten Gerät gehören
  - condition: template
    value_template: >-
      {% set dev = inputs.remote_device %}
      {% if trigger.event.event_type == 'zha_event' %}
        {{ trigger.event.data.device_id == dev }}
      {% elif trigger.event.event_type == 'state_changed' %}
        {{ trigger.event.data.entity_id in device_entities(dev) and 'action' in trigger.event.data.entity_id }}
      {% else %}
        false
      {% endif %}

action:
  - variables:
      action_val: >-
        {% if trigger.event.event_type == 'zha_event' %}
          {{ trigger.event.data.command }}
        {% else %}
          {{ trigger.event.data.new_state.state }}
        {% endif %}
      step_val: !input dim_step
      step_down: "{{ (step_val | int) * -1 }}"

  - choose:
      # --- Taste 1 (Großer Punkt): Klick -> Toggle ---
      - conditions:
          - condition: template
            value_template: "{{ action_val in ['on', '1_single', 'button_1_single', 'initial_press_1'] }}"
        sequence:
          - action: light.toggle
            target: !input target_light

      # --- Taste 2 (Kleiner Punkt): Klick -> Toggle ---
      - conditions:
          - condition: template
            value_template: "{{ action_val in ['off', '2_single', 'button_2_single', 'initial_press_2'] }}"
        sequence:
          - action: light.toggle
            target: !input target_light

      # --- Taste 1 (Großer Punkt): Halten -> Hochdimmen ---
      - conditions:
          - condition: template
            value_template: "{{ action_val in ['brightness_move_up', 'move_with_on_off', '1_hold', 'hold_1'] }}"
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: "{{ true }}"
              sequence:
                - action: light.turn_on
                  target: !input target_light
                  data:
                    brightness_step_pct: !input dim_step
                - delay:
                    milliseconds: !input dim_speed

      # --- Taste 2 (Kleiner Punkt): Halten -> Runterdimmen ---
      - conditions:
          - condition: template
            value_template: "{{ action_val in ['brightness_move_down', 'move', '2_hold', 'hold_2'] }}"
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: "{{ true }}"
              sequence:
                - action: light.turn_on
                  target: !input target_light
                  data:
                    brightness_step_pct: "{{ step_down }}"
                - delay:
                    milliseconds: !input dim_speed

      # --- Loslassen: Bricht die Dimm-Schleife ab ---
      - conditions:
          - condition: template
            value_template: "{{ action_val in ['brightness_stop', 'stop', 'stop_with_on_off', 'release', '1_release', '2_release', ''] }}"
        sequence: []
