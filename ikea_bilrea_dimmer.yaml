blueprint:
  name: "IKEA BILRESA - KAJPLATS Dimmer Steuerung (mit OFF-Sperre)"
  description: "Dimmer Steuerung für BILRESA. Ignoriert Scroll-Events bei ausgeschalteter Lampe, um ungewolltes Wiedereinschalten zu verhindern."
  domain: automation
  source_url: https://github.com/FlorianDessloch/my-home-assistant-blueprints/blob/main/ikea_bilrea_dimmer.yaml
  input:
    bilresa_device:
      name: "BILRESA Remote (Quellgerät)"
      description: "Wähle hier deine IKEA BILRESA Fernbedienung aus."
      selector:
        device:
          multiple: false
    light_1:
      name: "Lampe Modus 1 (LED 1)"
      selector:
        entity:
          domain: light
    light_2:
      name: "Lampe Modus 2 (LED 2)"
      selector:
        entity:
          domain: light
    light_3:
      name: "Lampe Modus 3 (LED 3)"
      selector:
        entity:
          domain: light
    step_pct:
      name: "Dimm-Schrittweite (%)"
      description: "Helligkeitsänderung pro Scroll-Raste (Empfohlen: 5-10%)"
      default: 7
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: "%"

mode: single
max_exceeded: silent

variables:
  target_device: !input bilresa_device
  l1: !input light_1
  l2: !input light_2
  l3: !input light_3
  step: !input step_pct

trigger:
  - platform: event
    event_type: state_changed

condition:
  # Nur Sensoren des Geräts verarbeiten (schließt parallele event.-Signale aus)
  - condition: template
    value_template: "{{ trigger.event.data.entity_id.startswith('sensor.') }}"
  - condition: template
    value_template: "{{ trigger.event.data.entity_id in device_entities(target_device) }}"
  - condition: template
    value_template: "{{ trigger.event.data.new_state is not none and trigger.event.data.old_state is not none }}"
  - condition: template
    value_template: "{{ trigger.event.data.new_state.state != trigger.event.data.old_state.state }}"

action:
  - variables:
      ent: "{{ trigger.event.data.entity_id }}"
      new_st: "{{ trigger.event.data.new_state.state }}"

  - choose:
      # === MODUS 1 (LED 1) ===
      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_3') }}"
          - condition: template
            value_template: "{{ new_st in ['1', 1, 'on', 'true'] }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: !input light_1
          - delay:
              milliseconds: 300

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_1') }}"
          - condition: template
            value_template: "{{ is_state(l1, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_1
            data:
              brightness_step_pct: "{{ step }}"
              transition: 0

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_2') }}"
          - condition: template
            value_template: "{{ is_state(l1, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_1
            data:
              brightness_step_pct: "{{ step * -1 }}"
              transition: 0

      # === MODUS 2 (LED 2) ===
      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_6') }}"
          - condition: template
            value_template: "{{ new_st in ['1', 1, 'on', 'true'] }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: !input light_2
          - delay:
              milliseconds: 300

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_4') }}"
          - condition: template
            value_template: "{{ is_state(l2, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_2
            data:
              brightness_step_pct: "{{ step }}"
              transition: 0

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_5') }}"
          - condition: template
            value_template: "{{ is_state(l2, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_2
            data:
              brightness_step_pct: "{{ step * -1 }}"
              transition: 0

      # === MODUS 3 (LED 3) ===
      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_9') }}"
          - condition: template
            value_template: "{{ new_st in ['1', 1, 'on', 'true'] }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: !input light_3
          - delay:
              milliseconds: 300

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_7') }}"
          - condition: template
            value_template: "{{ is_state(l3, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_3
            data:
              brightness_step_pct: "{{ step }}"
              transition: 0

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_8') }}"
          - condition: template
            value_template: "{{ is_state(l3, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_3
            data:
              brightness_step_pct: "{{ step * -1 }}"
              transition: 0
