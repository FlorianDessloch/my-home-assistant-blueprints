blueprint:
  name: "IKEA BILRESA - KAJPLATS Dimmer Steuerung (mit OFF-Sperre)"
  description: "Dimmer Steuerung für BILRESA. Ignoriert Scroll-Events bei ausgeschalteter Lampe, um ungewolltes Wiedereinschalten zu verhindern."
  domain: automation
  source_url: https://github.com/FlorianDessloch/my-home-assistant-blueprints/blob/main/ikea_bilrea_dimmer.yaml
  input:
    scroll_sensors:
      name: "BILRESA Scroll-Sensoren (1 bis 9)"
      description: "Wähle hier alle 9 Schalterstellungs-Sensoren deiner BILRESA aus (sensor...schalterstellung_1 bis 9)."
      selector:
        entity:
          domain: sensor
          multiple: true
    light_1:
      name: "Lampe Modus 1 (LED 1)"
      selector:
        entity:
          domain: light
    light_2:
      name: "Lampe Modus 2 (LED 2)"
      selector:
        entity:
          domain: light
    light_3:
      name: "Lampe Modus 3 (LED 3)"
      selector:
        entity:
          domain: light
    step_pct:
      name: "Dimm-Schrittweite (%)"
      description: "Helligkeitsänderung pro Raste"
      default: 7
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: "%"

mode: queued
max: 25

variables:
  l1: !input light_1
  l2: !input light_2
  l3: !input light_3
  step: !input step_pct

trigger:
  - platform: state
    entity_id: !input scroll_sensors

condition:
  - condition: template
    value_template: "{{ trigger.to_state is not none and trigger.from_state is not none }}"
  - condition: template
    value_template: "{{ trigger.to_state.state != trigger.from_state.state }}"

action:
  - variables:
      ent: "{{ trigger.entity_id }}"

  - choose:
      # === MODUS 1 (LED 1) ===
      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_3') }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: !input light_1

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_1') }}"
          - condition: template
            value_template: "{{ is_state(l1, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_1
            data:
              brightness_step_pct: "{{ step }}"
              transition: 0

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_2') }}"
          - condition: template
            value_template: "{{ is_state(l1, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_1
            data:
              brightness_step_pct: "{{ step * -1 }}"
              transition: 0

      # === MODUS 2 (LED 2) ===
      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_6') }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: !input light_2

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_4') }}"
          - condition: template
            value_template: "{{ is_state(l2, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_2
            data:
              brightness_step_pct: "{{ step }}"
              transition: 0

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_5') }}"
          - condition: template
            value_template: "{{ is_state(l2, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_2
            data:
              brightness_step_pct: "{{ step * -1 }}"
              transition: 0

      # === MODUS 3 (LED 3) ===
      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_9') }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: !input light_3

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_7') }}"
          - condition: template
            value_template: "{{ is_state(l3, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_3
            data:
              brightness_step_pct: "{{ step }}"
              transition: 0

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_8') }}"
          - condition: template
            value_template: "{{ is_state(l3, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_3
            data:
              brightness_step_pct: "{{ step * -1 }}"
              transition: 0
