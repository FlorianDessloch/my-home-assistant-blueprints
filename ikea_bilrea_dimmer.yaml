blueprint:
  name: "IKEA BILRESA - KAJPLATS Dimmer Steuerung (mit OFF-Sperre)"
  description: "Dimmer Steuerung für BILRESA. Ignoriert Scroll-Events bei ausgeschalteter Lampe, um ungewolltes Wiedereinschalten zu verhindern."
  domain: automation
  source_url: https://github.com/FlorianDessloch/my-home-assistant-blueprints/blob/main/ikea_bilrea_dimmer.yaml
  input:
    bilresa_device:
      name: "BILRESA Remote (Quellgerät)"
      description: "Wähle hier deine IKEA BILRESA Fernbedienung aus."
      selector:
        device:
          multiple: false
    scene1_light:
      name: "Lampe Modus 1 (LED 1)"
      selector:
        entity:
          domain: light
    scene2_light:
      name: "Lampe Modus 2 (LED 2)"
      selector:
        entity:
          domain: light
    scene3_light:
      name: "Lampe Modus 3 (LED 3)"
      selector:
        entity:
          domain: light
    step_pct:
      name: "Dimm-Schrittweite (%)"
      description: "Helligkeitsänderung pro Scroll-Raste (Empfohlen: 5-10%)"
      default: 7
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: "%"

mode: restart

variables:
  target_device: !input bilresa_device
  s1: !input scene1_light
  s2: !input scene2_light
  s3: !input scene3_light
  step: !input step_pct

trigger:
  - platform: event
    event_type: state_changed

condition:
  - condition: template
    value_template: "{{ trigger.event.data.entity_id in device_entities(target_device) }}"
  - condition: template
    value_template: "{{ trigger.event.data.new_state is not none and trigger.event.data.old_state is not none }}"
  - condition: template
    value_template: "{{ trigger.event.data.new_state.state != trigger.event.data.old_state.state }}"

action:
  - variables:
      ent: "{{ trigger.event.data.entity_id }}"

  - choose:
      # === MODUS 1 (LED 1) ===
      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_3') or 'taste_3' in ent }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: !input scene1_light

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_1') or 'taste_1' in ent }}"
          - condition: template
            value_template: "{{ is_state(s1, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input scene1_light
            data:
              brightness_step_pct: "{{ step }}"
              transition: 0

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_2') or 'taste_2' in ent }}"
          - condition: template
            value_template: "{{ is_state(s1, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input scene1_light
            data:
              brightness_step_pct: "{{ step * -1 }}"
              transition: 0

      # === MODUS 2 (LED 2) ===
      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_6') or 'taste_6' in ent }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: !input scene2_light

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_4') or 'taste_4' in ent }}"
          - condition: template
            value_template: "{{ is_state(s2, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input scene2_light
            data:
              brightness_step_pct: "{{ step }}"
              transition: 0

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_5') or 'taste_5' in ent }}"
          - condition: template
            value_template: "{{ is_state(s2, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input scene2_light
            data:
              brightness_step_pct: "{{ step * -1 }}"
              transition: 0

      # === MODUS 3 (LED 3) ===
      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_9') or 'taste_9' in ent }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: !input scene3_light

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_7') or 'taste_7' in ent }}"
          - condition: template
            value_template: "{{ is_state(s3, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input scene3_light
            data:
              brightness_step_pct: "{{ step }}"
              transition: 0

      - conditions:
          - condition: template
            value_template: "{{ ent.endswith('_8') or 'taste_8' in ent }}"
          - condition: template
            value_template: "{{ is_state(s3, 'on') }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input scene3_light
            data:
              brightness_step_pct: "{{ step * -1 }}"
              transition: 0
